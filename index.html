  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 2rem; background: var(--paper); box-shadow: 0 0 40px rgba(0,0,0,0.35); }

  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 0.85rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.75rem;
  }
  .brand { display: flex; align-items: center; gap: 0.6rem; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 8px;
    background: var(--rust);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-mark svg { width: 18px; height: 18px; }
  .brand-text { line-height: 1.15; }
  .brand-title { font-size: 15px; font-weight: 700; letter-spacing: 0.2px; }
  .brand-sub { font-size: 11.5px; color: var(--ink-soft); }
  .topbar-right { display: flex; align-items: center; gap: 0.5rem; }
  .date-pill {
    font-size: 12px; color: var(--ink-soft);

    box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 8l9-5 9 5-9 5-9-5z" stroke-linejoin="round"/><path d="M3 8v8l9 5 9-5V8M12 13v8" stroke-linejoin="round"/></svg>',

  };
  function icon(name) { return ICONS[name] || ""; }

  // ---------- State ----------
  const todayKey = () => new Date().toISOString().slice(0, 10);
  const nowTime = () => new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  const fmtMoney = (n) => "KSh " + Math.round(n).toLocaleString();

  // Mon/Wed/Fri share a menu, Tue/Thu/Sat share a menu, Sunday is its own.
  const DAY_GROUP_LABEL = { mwf: "Mon / Wed / Fri", tts: "Tue / Thu / Sat", sun: "Sunday" };
  function dayGroupFor(date) {
    const d = date.getDay(); // 0=Sun,1=Mon,...6=Sat
    if (d === 0) return "sun";
    if (d === 1 || d === 3 || d === 5) return "mwf";
    return "tts"; // 2,4,6 = Tue, Thu, Sat
  }

  let state = {
    screen: "role",          // role | waiterName | waiter | managerHome
    role: null,
    waiterName: "",
    today: todayKey(),
    dayGroup: dayGroupFor(new Date()),
    foodMenu: [],            // [{id,name,price,section:'food',day_group}] — today's day-group only
    drinksMenu: [],          // [{id,name,price,section:'drinks'}] — always active
    snacksMenu: [],          // [{id,name,price,section:'snacks'}] — always active
    stock: {},               // { itemId: startingQty }  (only for items with limited stock today)
    sales: [],               // [{id,itemId,name,qty,price,waiter,table,time}]
    cart: {},                // { itemId: qty }
    tableNum: "",
    sheetOpen: false,
    toast: null,
    managerTab: "live",      // live | items | waiters | setup
    setupSection: "food",    // food | drinks | snacks  (which section manager is editing)
    setupDayGroup: dayGroupFor(new Date()), // which food day-group manager is editing
    setupItems: [],          // items currently shown in the manager setup list
    loading: true
  };

  function toast(msg) {
    state.toast = msg;
    render();
    setTimeout(() => { state.toast = null; render(); }, 2200);
  }

  // ---------- Supabase data access ----------
  function logErr(label, error) { if (error) console.error(label, error); }

  async function fetchMenu() {
    const [foodRes, drinksRes, snacksRes] = await Promise.all([
      sb.from("menu_items").select("*").eq("section", "food").eq("day_group", state.dayGroup).eq("active", true).order("created_at"),
      sb.from("menu_items").select("*").eq("section", "drinks").eq("active", true).order("created_at"),
      sb.from("menu_items").select("*").eq("section", "snacks").eq("active", true).order("created_at")
    ]);
    logErr("fetch food menu", foodRes.error);
    logErr("fetch drinks menu", drinksRes.error);
    logErr("fetch snacks menu", snacksRes.error);
    state.foodMenu = foodRes.data || [];
    state.drinksMenu = drinksRes.data || [];
    state.snacksMenu = snacksRes.data || [];
  }

  async function fetchStock() {
    const { data, error } = await sb.from("stock").select("item_id, starting_qty").eq("date", state.today);
    logErr("fetch stock", error);
    const map = {};
    (data || []).forEach(row => { map[row.item_id] = row.starting_qty; });
    state.stock = map;
  }

  async function fetchSales() {
    const start = state.today + "T00:00:00";
    const end = state.today + "T23:59:59";
    const { data, error } = await sb.from("sales").select("*")
      .gte("created_at", start).lte("created_at", end)
      .order("created_at", { ascending: true });
    logErr("fetch sales", error);
    state.sales = (data || []).map(row => ({
      id: row.id, itemId: row.item_id, name: row.item_name, qty: row.qty,
      price: row.price, waiter: row.waiter_name, table: row.table_num,
      time: new Date(row.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    }));
  }

  async function loadAll() {
    await Promise.all([fetchMenu(), fetchStock(), fetchSales()]);
    state.loading = false;
    render();
  }

  async function fetchMenuForSetup() {
    // Loads whichever section/day-group the manager is currently editing
    if (state.setupSection === "food") {
      const { data, error } = await sb.from("menu_items").select("*")
        .eq("section", "food").eq("day_group", state.setupDayGroup).eq("active", true).order("created_at");
      logErr("fetch setup food", error);
      state.setupItems = data || [];
    } else {
      const { data, error } = await sb.from("menu_items").select("*")
        .eq("section", state.setupSection).eq("active", true).order("created_at");
      logErr("fetch setup " + state.setupSection, error);
      state.setupItems = data || [];
    }
  }

  function allActiveItems() {
    return [...state.foodMenu, ...state.drinksMenu, ...state.snacksMenu];
  }

  function soldQtyFor(itemId) {
    return state.sales.filter(s => s.itemId === itemId).reduce((a, s) => a + s.qty, 0);
  }

  function remainingFor(itemId) {
    if (!(itemId in state.stock)) return null; // unlimited
    return state.stock[itemId] - soldQtyFor(itemId);
  }

  // ---------- Rendering ----------
  const app = document.getElementById("app");

  function render() {
    let html = "";
    if (state.toast) {
      html += `<div class="toast">${icon("check")}${escapeHtml(state.toast)}</div>`;
    }
    switch (state.screen) {
      case "role": html += renderRole(); break;
      case "waiterName": html += renderWaiterName(); break;
      case "waiter": html += renderWaiter(); break;
      case "managerHome": html += renderManagerHome(); break;
      default: html += renderRole();
    }
    app.innerHTML = html;
    attachHandlers();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function topbar(title, sub, opts) {
    opts = opts || {};
    return `
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">${icon("logo")}</div>
        <div class="brand-text">
          <div class="brand-title">${escapeHtml(HOTEL_NAME)}</div>
          <div class="brand-sub">${escapeHtml(title)}${sub ? " · " + escapeHtml(sub) : ""}</div>
        </div>
      </div>
      <div class="topbar-right">
        ${opts.dateShown ? `<span class="date-pill">${new Date(state.today + "T00:00:00").toLocaleDateString([], { weekday: "short", day: "numeric", month: "short" })}</span>` : ""}
        ${opts.showLogout ? `<button class="icon-btn" data-action="logout" aria-label="Switch role">${icon("logout")}</button>` : ""}
      </div>
    </div>`;
  }

  // ---------- Screen: role picker ----------
  function renderRole() {
    return `
    <div class="role-wrap">
      <h2 class="sr-only">Order board hotel point of sale. Choose whether you are a waiter or the manager.</h2>
      <div class="role-mark">${icon("logo")}</div>
      <div style="font-size:12.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin-bottom:0.2rem;">${escapeHtml(HOTEL_NAME)}</div>
      <h1>Order Board</h1>
      <p>Ring up orders table-side and keep every waiter's sales in one place.</p>

      <div class="role-card" data-action="pick-waiter">
        <div class="role-card-icon">${icon("waiter")}</div>
        <div>
          <div class="role-card-title">I'm a waiter</div>
          <div class="role-card-sub">Take orders and log sales as they happen</div>
        </div>
        <div class="role-card-arrow">${icon("arrow")}</div>
      </div>

      <div class="role-card manager" data-action="pick-manager">
        <div class="role-card-icon">${icon("manager")}</div>
        <div>
          <div class="role-card-title">I'm the manager</div>
          <div class="role-card-sub">Set today's menu and watch sales come in</div>
        </div>
        <div class="role-card-arrow">${icon("arrow")}</div>
      </div>
    </div>`;
  }

  // ---------- Screen: waiter name entry ----------
  function renderWaiterName() {
    return `
    <div class="role-wrap">
      <h2 class="sr-only">Enter your name to start taking orders.</h2>
      <div class="role-mark">${icon("waiter")}</div>
      <h1>Your name</h1>
      <p>This tags every sale you log so the manager knows whose it is.</p>
      <div class="field name-input-wrap">
        <input type="text" id="waiterNameInput" placeholder="e.g. Naomi" value="${escapeHtml(state.waiterName)}" autofocus>
      </div>
      <button class="btn primary" data-action="confirm-waiter-name" style="margin-top:0.6rem">Start taking orders ${icon("arrow")}</button>
      <button class="btn ghost" data-action="back-to-role" style="margin-top:0.6rem">${icon("back")} Back</button>
    </div>`;
  }

  // ---------- Screen: waiter ordering ----------
  function renderWaiter() {
    if (state.loading) return topbar("Order Board", "Loading…");

    const cartCount = Object.values(state.cart).reduce((a, b) => a + b, 0);
    const cartTotal = Object.entries(state.cart).reduce((sum, [id, qty]) => {
      const item = allActiveItems().find(i => i.id === id);
      return sum + (item ? item.price * qty : 0);
    }, 0);

    const food = state.foodMenu;
    const drinks = state.drinksMenu;
    const snacks = state.snacksMenu;

    let body = "";
    if (food.length === 0 && drinks.length === 0 && snacks.length === 0) {
      body += `
      <div class="empty-state">
        ${icon("box")}
        <p>No menu items yet. Ask the manager to set up the menu to get started.</p>
      </div>`;
    } else {
      if (food.length > 0) {
        body += renderCategoryGroup("Food · " + DAY_GROUP_LABEL[state.dayGroup], "today", food);
      }
      if (drinks.length > 0) {
        body += renderCategoryGroup("Drinks", "standing", drinks);
      }
      if (snacks.length > 0) {
        body += renderCategoryGroup("Snacks", "standing", snacks);
      }
    }

    // recent sales by this waiter
    const mine = state.sales.filter(s => s.waiter === state.waiterName).slice().reverse().slice(0, 6);
    let recentHtml = "";
    if (mine.length > 0) {
      recentHtml = `
      <div class="section-head" style="margin-top:1.4rem;">
        <h2>Your recent sales</h2>
      </div>`;
      mine.forEach(s => {
        recentHtml += `
        <div class="sale-row">
          <div class="sale-icon">${s.qty}×</div>
          <div class="sale-body">
            <div class="sale-name">${escapeHtml(s.name)}</div>
            <div class="sale-sub">${s.table ? "Table " + escapeHtml(s.table) + " · " : ""}${s.time}</div>
          </div>
          <div class="sale-amt">${fmtMoney(s.price * s.qty)}</div>
        </div>`;
      });
    }

    let html = topbar("Order Board", state.waiterName, { dateShown: true, showLogout: true });
    html += `<div class="screen tight"><h1 class="page-title">Take an order</h1><p class="page-sub">Tap an item to add it to the ticket, then send it through.</p></div>`;
    html += `<div class="screen" style="padding-top:0">${body}${recentHtml}</div>`;

    if (cartCount > 0) {
      html += `
      <div class="ticket-bar" data-action="open-sheet">
        <div class="ticket-bar-row">
          <div>
            <div class="ticket-info">${cartCount} item${cartCount > 1 ? "s" : ""} on ticket</div>
            <div class="ticket-total">${fmtMoney(cartTotal)}</div>
          </div>
          <button class="btn primary" data-action="open-sheet" data-stop="1">${icon("receipt")} Review</button>
        </div>
      </div>`;
    }

    if (state.sheetOpen) html += renderCartSheet();

    return html;
  }

  function renderCategoryGroup(title, tagType, items) {
    let html = `
    <div class="cat-group">
      <div class="cat-head">
        <span class="cat-tag ${tagType}">${tagType === "today" ? "Today only" : "Standing"}</span>
        <div class="cat-rule"></div>
      </div>
      <div class="item-grid">`;
    items.forEach(item => {
      const remaining = remainingFor(item.id);
      const inCart = state.cart[item.id] || 0;
      const isOut = remaining !== null && remaining <= 0;
      const isLow = remaining !== null && remaining > 0 && remaining <= 3;
      html += `
      <div class="item-tile ${isOut ? "out" : ""} ${isLow ? "low" : ""}" data-action="add-to-cart" data-item="${item.id}">
        ${inCart > 0 ? `<div class="qty-badge">${inCart}</div>` : ""}
        <div class="item-name">${escapeHtml(item.name)}</div>
        <div class="item-meta">
          <span class="item-price">${fmtMoney(item.price)}</span>
          ${remaining !== null ? `<span class="item-stock">${isOut ? "Out" : remaining + " left"}</span>` : ""}
        </div>
      </div>`;
    });
    html += `</div></div>`;
    return html;
  }

  function renderCartSheet() {
    const cartEntries = Object.entries(state.cart).filter(([, qty]) => qty > 0);
    let total = 0;
    let lines = "";
    cartEntries.forEach(([id, qty]) => {
      const item = allActiveItems().find(i => i.id === id);
      if (!item) return;
      total += item.price * qty;
      lines += `
      <div class="cart-line">
        <div style="flex:1">
          <div class="cart-line-name">${escapeHtml(item.name)}</div>
          <div class="cart-line-price">${fmtMoney(item.price)} each</div>
        </div>
        <div class="stepper">
          <button data-action="dec-item" data-item="${id}" aria-label="Remove one">−</button>
          <span>${qty}</span>
          <button data-action="inc-item" data-item="${id}" aria-label="Add one">+</button>
        </div>
      </div>`;
    });

    if (cartEntries.length === 0) {
      return `
      <div class="sheet-overlay" data-action="close-sheet">
        <div class="sheet" data-stop="1">
          <div class="sheet-handle"></div>
          <div class="empty-state"><p>Ticket is empty.</p></div>
        </div>
      </div>`;
    }

    return `
    <div class="sheet-overlay" data-action="close-sheet">
      <div class="sheet" data-stop="1">
        <div class="sheet-handle"></div>
        <div class="sheet-head"><h2>Review ticket</h2><button class="icon-btn" data-action="close-sheet" aria-label="Close">✕</button></div>
        ${lines}
        <div class="field" style="margin-top:0.9rem;">
          <label class="field-label">Table number (optional)</label>
          <input type="text" id="tableInput" placeholder="e.g. 12" value="${escapeHtml(state.tableNum)}">
        </div>
        <div class="divider"></div>
        <div class="total-row"><span>Total</span><span>${fmtMoney(total)}</span></div>
        <button class="btn primary" data-action="submit-sale">${icon("check")} Send to kitchen and log sale</button>
      </div>
    </div>`;
  }

  // ---------- Screen: manager home ----------
  function renderManagerHome() {
    if (state.loading) return topbar("Order Board", "Loading…");

    let html = topbar("Order Board", "Manager view", { dateShown: true, showLogout: true });
    html += `
    <div class="tabs">
      <button class="tab ${state.managerTab === "live" ? "active" : ""}" data-action="mtab" data-tab="live">Live sales</button>
      <button class="tab ${state.managerTab === "items" ? "active" : ""}" data-action="mtab" data-tab="items">Item summary</button>
      <button class="tab ${state.managerTab === "waiters" ? "active" : ""}" data-action="mtab" data-tab="waiters">By waiter</button>
      <button class="tab ${state.managerTab === "setup" ? "active" : ""}" data-action="mtab" data-tab="setup">Menu setup</button>
    </div>`;

    let body = "";
    if (state.managerTab === "live") body = renderTabLive();
    else if (state.managerTab === "items") body = renderTabItems();
    else if (state.managerTab === "waiters") body = renderTabWaiters();
    else body = renderTabSetup();

    html += `<div class="screen" style="padding-top:0.2rem">${body}</div>`;
    return html;
  }

  function renderTabLive() {
    const totalRevenue = state.sales.reduce((a, s) => a + s.price * s.qty, 0);
    const totalItems = state.sales.reduce((a, s) => a + s.qty, 0);
    const waitersActive = new Set(state.sales.map(s => s.waiter)).size;

    let html = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Revenue today</div>
        <div class="stat-value rust">${fmtMoney(totalRevenue)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Items sold</div>
        <div class="stat-value olive">${totalItems}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Waiters selling</div>
        <div class="stat-value">${waitersActive}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tickets logged</div>
        <div class="stat-value">${state.sales.length}</div>
      </div>
    </div>`;

    html += `<div class="section-head"><h2>All sales, newest first</h2></div>`;
    if (state.sales.length === 0) {
      html += `<div class="empty-state">${icon("receipt")}<p>No sales logged yet today. Once waiters start ringing up orders, they'll show here instantly.</p></div>`;
    } else {
      const recent = state.sales.slice().reverse().slice(0, 40);
      recent.forEach(s => {
        html += `
        <div class="sale-row">
          <div class="sale-icon">${s.qty}×</div>
          <div class="sale-body">
            <div class="sale-name">${escapeHtml(s.name)}</div>
            <div class="sale-sub">${escapeHtml(s.waiter)}${s.table ? " · Table " + escapeHtml(s.table) : ""} · ${s.time}</div>
          </div>
          <div class="sale-amt">${fmtMoney(s.price * s.qty)}</div>
        </div>`;
      });
    }
    return html;
  }

  function renderTabItems() {
    const items = allActiveItems();
    if (items.length === 0) {
      return `<div class="empty-state">${icon("box")}<p>Add menu items in the "Menu setup" tab to start tracking sales per item.</p></div>`;
    }
    // sort by qty sold desc
    const withCounts = items.map(item => ({
      item, sold: soldQtyFor(item.id), remaining: remainingFor(item.id)
    })).sort((a, b) => b.sold - a.sold);

    const maxSold = Math.max(1, ...withCounts.map(w => w.sold));

    let html = `<div class="section-head"><h2>Best sellers today</h2></div>`;
    withCounts.slice(0, 8).filter(w => w.sold > 0).forEach((w, idx) => {
      html += `
      <div class="rank-row">
        <div class="rank-num">${idx + 1}</div>
        <div class="rank-bar-wrap">
          <div class="rank-name-row"><span>${escapeHtml(w.item.name)}</span><span class="rank-count">${w.sold} sold</span></div>
          <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${Math.max(4, (w.sold / maxSold) * 100)}%"></div></div>
        </div>
      </div>`;
    });
    if (withCounts.every(w => w.sold === 0)) {
      html += `<div class="empty-state"><p>Nothing sold yet today.</p></div>`;
    }

    html += `<div class="section-head" style="margin-top:1.2rem"><h2>Stock and remaining</h2></div>`;
    html += `<div class="info-banner">${icon("info")}Items with a stock count show how many are left, so you know what to top up or push before it runs out. Items without a stock count are treated as always available.</div>`;
    const stocked = withCounts.filter(w => w.remaining !== null);
    if (stocked.length === 0) {
      html += `<div class="empty-state"><p>No items have a starting stock count set. Add stock counts when setting today's menu to track remaining pieces.</p></div>`;
    } else {
      stocked.forEach(w => {
        const cls = w.remaining <= 0 ? "out" : (w.remaining <= 3 ? "low" : "");
        html += `
        <div class="stock-row">
          <div class="stock-name">${escapeHtml(w.item.name)}</div>
          <div class="stock-nums">${w.sold} sold · <span class="stock-remaining ${cls}">${w.remaining <= 0 ? "out" : w.remaining + " left"}</span></div>
        </div>`;
      });
    }
    return html;
  }

  function renderTabWaiters() {
    const byWaiter = {};
    state.sales.forEach(s => {
      if (!byWaiter[s.waiter]) byWaiter[s.waiter] = { revenue: 0, items: 0, tickets: 0 };
      byWaiter[s.waiter].revenue += s.price * s.qty;
      byWaiter[s.waiter].items += s.qty;
      byWaiter[s.waiter].tickets += 1;
    });
    const list = Object.entries(byWaiter).sort((a, b) => b[1].revenue - a[1].revenue);

    if (list.length === 0) {
      return `<div class="empty-state">${icon("users")}<p>No waiter has logged a sale yet today.</p></div>`;
    }

    const maxRev = Math.max(1, ...list.map(([, v]) => v.revenue));
    let html = `<div class="section-head"><h2>Sales by waiter</h2></div>`;
    list.forEach(([name, v], idx) => {
      html += `
      <div class="rank-row">
        <div class="rank-num">${idx + 1}</div>
        <div class="rank-bar-wrap">
          <div class="rank-name-row"><span>${escapeHtml(name)}</span><span class="rank-count">${fmtMoney(v.revenue)}</span></div>
          <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${Math.max(4, (v.revenue / maxRev) * 100)}%"></div></div>
          <div style="font-size:11.5px;color:var(--ink-soft);margin-top:0.25rem">${v.items} items · ${v.tickets} tickets</div>
        </div>
      </div>`;
    });
    return html;
  }

  function renderTabSetup() {
    let html = `<div class="info-banner">${icon("sun")}Drinks and snacks stay the same every day — set them up once. Food rotates: build the Mon/Wed/Fri menu, the Tue/Thu/Sat menu, and the Sunday menu separately, and the app switches automatically based on today's date.</div>`;

    // Section sub-tabs (food / drinks / snacks)
    html += `<div class="tabs" style="padding:0 0 0.7rem;">
      <button class="tab ${state.setupSection === "food" ? "active" : ""}" data-action="setup-section" data-section="food">Food</button>
      <button class="tab ${state.setupSection === "drinks" ? "active" : ""}" data-action="setup-section" data-section="drinks">Drinks</button>
      <button class="tab ${state.setupSection === "snacks" ? "active" : ""}" data-action="setup-section" data-section="snacks">Snacks</button>
    </div>`;

    // Day-group sub-tabs (only for food)
    if (state.setupSection === "food") {
      html += `<div class="tabs" style="padding:0 0 0.9rem;">`;
      ["mwf", "tts", "sun"].forEach(g => {
        const isToday = g === state.dayGroup;
        html += `<button class="tab ${state.setupDayGroup === g ? "active" : ""}" data-action="setup-daygroup" data-daygroup="${g}">${DAY_GROUP_LABEL[g]}${isToday ? " · Today" : ""}</button>`;
      });
      html += `</div>`;
    }

    const editingToday = state.setupSection !== "food" || state.setupDayGroup === state.dayGroup;

    html += `<div class="section-head"><h2>Add an item</h2></div>`;
    html += `
    <div class="add-form">
      <div class="field">
        <label class="field-label">Item name</label>
        <input type="text" id="newItemName" placeholder="e.g. Grilled tilapia">
      </div>
      <div class="row-2">
        <div class="field">
          <label class="field-label">Price (KSh)</label>
          <input type="number" id="newItemPrice" placeholder="450" min="0" inputmode="decimal">
        </div>
        <div class="field">
          <label class="field-label">Starting stock</label>
          <input type="number" id="newItemStock" placeholder="Leave blank if unlimited" min="0" inputmode="numeric" ${editingToday ? "" : "disabled"}>
        </div>
      </div>
      ${editingToday ? "" : `<p style="font-size:11.5px;color:var(--ink-soft);margin:-0.3rem 0 0.7rem;">Stock counts only apply to today — come back on that day to set stock for this menu.</p>`}
      <button class="btn secondary" data-action="add-item">${icon("plus")} Add item</button>
    </div>`;

    const sectionLabel = state.setupSection === "food" ? DAY_GROUP_LABEL[state.setupDayGroup] + " menu" : (state.setupSection === "drinks" ? "Drinks menu" : "Snacks menu");
    html += `<div class="section-head"><h2>${sectionLabel}</h2></div>`;
    if (state.setupItems.length === 0) {
      html += `<div class="empty-state" style="padding:1.2rem;"><p>No items here yet.</p></div>`;
    } else {
      state.setupItems.forEach(item => {
        html += `
        <div class="setup-item-row">
          <div class="setup-item-name">${escapeHtml(item.name)} · ${fmtMoney(item.price)}</div>
          ${item.id in state.stock ? `<span class="setup-item-stock-tag">${state.stock[item.id]} stocked</span>` : ""}
          <button class="setup-item-remove" data-action="remove-setup-item" data-item="${item.id}" aria-label="Remove">${icon("trash")}</button>
        </div>`;
      });
    }
    return html;
  }

  // ---------- Event handling ----------
  function attachHandlers() {
    app.querySelectorAll("[data-action]").forEach(el => {
      el.addEventListener("click", onAction);
    });
  }

  function genId() {
    return "i" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  async function onAction(e) {
    if (e.currentTarget.dataset.stop) return; // inner button already handled by its own listener, avoid double
    const action = e.currentTarget.dataset.action;

    if (action === "pick-waiter") {
      state.role = "waiter";
      state.screen = state.waiterName ? "waiter" : "waiterName";
      render();
    } else if (action === "pick-manager") {
      state.role = "manager";
      state.screen = "managerHome";
      render();
    } else if (action === "confirm-waiter-name") {
      const val = document.getElementById("waiterNameInput").value.trim();
      if (!val) { toast("Enter your name to continue"); return; }
      state.waiterName = val;
      state.screen = "waiter";
      render();
    } else if (action === "back-to-role") {
      state.screen = "role";
      render();
    } else if (action === "logout") {
      state.screen = "role";
      state.cart = {};
      state.sheetOpen = false;
      state.waiterName = "";
      render();
    } else if (action === "add-to-cart") {
      const itemId = e.currentTarget.dataset.item;
      const remaining = remainingFor(itemId);
      const inCart = state.cart[itemId] || 0;
      if (remaining !== null && inCart >= remaining) { toast("No more left to sell"); return; }
      state.cart[itemId] = inCart + 1;
      render();
    } else if (action === "open-sheet") {
      state.sheetOpen = true;
      render();
    } else if (action === "close-sheet") {
      state.sheetOpen = false;
      render();
    } else if (action === "inc-item") {
      const id = e.currentTarget.dataset.item;
      const remaining = remainingFor(id);
      const cur = state.cart[id] || 0;
      if (remaining !== null && cur >= remaining) { toast("No more left to sell"); return; }
      state.cart[id] = cur + 1;
      render();
    } else if (action === "dec-item") {
      const id = e.currentTarget.dataset.item;
      const cur = state.cart[id] || 0;
      state.cart[id] = Math.max(0, cur - 1);
      if (state.cart[id] === 0) delete state.cart[id];
      render();
    } else if (action === "submit-sale") {
      await submitSale();
    } else if (action === "mtab") {
      state.managerTab = e.currentTarget.dataset.tab;
      if (state.managerTab === "setup" && state.setupItems.length === 0) {
        await fetchMenuForSetup();
      }
      render();
    } else if (action === "add-item") {
      await addMenuItem();
    } else if (action === "remove-setup-item") {
      await removeItem(e.currentTarget.dataset.item);
    } else if (action === "setup-section") {
      state.setupSection = e.currentTarget.dataset.section;
      await fetchMenuForSetup();
      render();
    } else if (action === "setup-daygroup") {
      state.setupDayGroup = e.currentTarget.dataset.daygroup;
      await fetchMenuForSetup();
      render();
    }
  }

  async function submitSale() {
    const tableInput = document.getElementById("tableInput");
    const table = tableInput ? tableInput.value.trim() : "";
    const entries = Object.entries(state.cart).filter(([, qty]) => qty > 0);
    if (entries.length === 0) return;

    const rows = entries.map(([id, qty]) => {
      const item = allActiveItems().find(i => i.id === id);
      return {
        item_id: id,
        item_name: item.name,
        qty,
        price: item.price,
        waiter_name: state.waiterName,
        table_num: table || null
      };
    });

    const { data, error } = await sb.from("sales").insert(rows).select();
    if (error) { logErr("insert sales", error); toast("Couldn't save sale — try again"); return; }

    // Keep a record of waiter names used (upsert, ignore if it already exists)
    await sb.from("waiters").upsert({ name: state.waiterName }, { onConflict: "name" });

    const newSales = (data || []).map(row => ({
      id: row.id, itemId: row.item_id, name: row.item_name, qty: row.qty,
      price: row.price, waiter: row.waiter_name, table: row.table_num,
      time: new Date(row.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    }));
    state.sales = [...state.sales, ...newSales];

    state.cart = {};
    state.tableNum = "";
    state.sheetOpen = false;
    render();
    toast("Sale logged");
  }

  async function addMenuItem() {
    const name = document.getElementById("newItemName").value.trim();
    const priceRaw = document.getElementById("newItemPrice").value;
    const stockRaw = document.getElementById("newItemStock").value;

    if (!name) { toast("Enter an item name"); return; }
    const price = parseFloat(priceRaw);
    if (!priceRaw || isNaN(price) || price < 0) { toast("Enter a valid price"); return; }

    const row = {
      name, price,
      section: state.setupSection,
      day_group: state.setupSection === "food" ? state.setupDayGroup : null
    };

    const { data, error } = await sb.from("menu_items").insert(row).select().single();
    if (error) { logErr("insert menu item", error); toast("Couldn't add item — try again"); return; }

    state.setupItems = [...state.setupItems, data];
    // Also refresh the waiter-facing menu if this item lands in today's view
    if (state.setupSection !== "food" || state.setupDayGroup === state.dayGroup) {
      await fetchMenu();
    }

    const editingToday = state.setupSection !== "food" || state.setupDayGroup === state.dayGroup;
    if (editingToday && stockRaw && !isNaN(parseInt(stockRaw)) && parseInt(stockRaw) >= 0) {
      const qty = parseInt(stockRaw);
      const { error: stockErr } = await sb.from("stock").upsert(
        { item_id: data.id, date: state.today, starting_qty: qty }, { onConflict: "item_id,date" }
      );
      logErr("insert stock", stockErr);
      if (!stockErr) state.stock[data.id] = qty;
    }

    render();
    toast(name + " added");
  }

  async function removeItem(itemId) {
    const { error } = await sb.from("menu_items").update({ active: false }).eq("id", itemId);
    if (error) { logErr("remove menu item", error); toast("Couldn't remove item — try again"); return; }

    state.setupItems = state.setupItems.filter(i => i.id !== itemId);
    await fetchMenu(); // refresh waiter-facing menu in case it changed

    if (itemId in state.stock) {
      delete state.stock[itemId];
      await sb.from("stock").delete().eq("item_id", itemId).eq("date", state.today);
    }
    render();
  }

  // ---------- Init ----------
  render(); // show loading shell immediately
  loadAll();
})();
</script>
</body>
</html>
